<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SIS-Erhebung · Pflegedienst Herrlich</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --navy:#211D5E; --navy-dark:#1A1749; --teal:#048AAE; --teal-light:#E0F3F8;
    --teal-dark:#036B87; --bg:#F4F5F9; --card:#FFFFFF; --text:#2B2B3A;
    --text-soft:#6B6B7E; --line:#E3E4EC; --ok:#1B9E6B; --warn:#D9822B;
    --danger:#C0392B; --radius:14px; --shadow:0 2px 12px rgba(33,29,94,.08);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{font-size:16px;}
  body{font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:120px;}

  header{background:var(--navy);color:#fff;padding:18px 18px 46px;}
  .logocard{background:#fff;border-radius:12px;padding:8px 14px;display:inline-block;box-shadow:var(--shadow);}
  .logocard img{height:40px;display:block;}
  header h1{margin-top:14px;font-size:1.3rem;font-weight:700;}
  header .sub{margin-top:4px;font-size:.83rem;color:rgba(255,255,255,.72);}

  .wrap{max-width:680px;margin:-28px auto 0;padding:0 14px;}

  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:14px;}
  .card h2{font-size:1.02rem;color:var(--navy);display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;}
  .card h2 .tfnum{background:var(--teal);color:#fff;font-size:.78rem;font-weight:700;min-width:30px;height:30px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
  .card h2 .chev{margin-left:auto;transition:transform .2s;color:var(--text-soft);font-size:.9rem;}
  .card.open h2 .chev{transform:rotate(180deg);}
  .card .body{display:none;margin-top:14px;}
  .card.open .body{display:block;}
  .card .donebadge{margin-left:auto;margin-right:8px;font-size:.72rem;color:var(--ok);font-weight:600;display:none;}
  .card.hasdata .donebadge{display:inline;}
  .card.hasdata h2 .tfnum{background:var(--ok);}

  .grp{margin-bottom:16px;}
  .grp:last-child{margin-bottom:2px;}
  .grp>label{display:block;font-size:.8rem;font-weight:600;color:var(--text-soft);margin-bottom:7px;text-transform:uppercase;letter-spacing:.03em;}

  .chips{display:flex;flex-wrap:wrap;gap:7px;}
  .chip{border:1.5px solid var(--line);background:#fff;color:var(--text);border-radius:999px;padding:7px 13px;font-size:.86rem;cursor:pointer;transition:all .12s;line-height:1.2;}
  .chip.on{background:var(--teal);border-color:var(--teal);color:#fff;font-weight:600;}
  .chip:focus-visible{outline:3px solid var(--teal-light);}

  .seg{display:flex;flex-wrap:wrap;gap:6px;}
  .seg .chip.on{background:var(--navy);border-color:var(--navy);}

  input[type=text],input[type=number],input[type=date],textarea,select{
    width:100%;border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;
    font-size:.95rem;font-family:inherit;background:#fff;color:var(--text);
  }
  textarea{min-height:64px;resize:vertical;}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--teal);}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .subnote{font-size:.78rem;color:var(--text-soft);margin-top:5px;}

  .risk-table{width:100%;}
  .risk-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line);flex-wrap:wrap;}
  .risk-row:last-child{border-bottom:none;}
  .risk-name{flex:1 1 140px;font-size:.9rem;font-weight:600;}
  .risk-opts{display:flex;gap:5px;}
  .risk-opts .chip{padding:5px 10px;font-size:.78rem;}
  .risk-opts .chip[data-v="kein"].on{background:#8A8A98;border-color:#8A8A98;}
  .risk-opts .chip[data-v="niedrig"].on{background:var(--ok);border-color:var(--ok);}
  .risk-opts .chip[data-v="mittel"].on{background:var(--warn);border-color:var(--warn);}
  .risk-opts .chip[data-v="hoch"].on{background:var(--danger);border-color:var(--danger);}

  .footer-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);padding:12px 14px calc(12px + env(safe-area-inset-bottom));display:flex;gap:10px;max-width:100%;z-index:50;}
  .footer-bar .inner{max-width:680px;margin:0 auto;display:flex;gap:10px;width:100%;}
  .btn{flex:1;border:none;border-radius:12px;padding:14px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;}
  .btn-primary{background:var(--teal);color:#fff;}
  .btn-primary:active{background:var(--teal-dark);}
  .btn-ghost{background:var(--teal-light);color:var(--teal-dark);flex:0 0 auto;padding:14px 16px;}

  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;border-radius:12px;padding:12px 20px;font-size:.9rem;opacity:0;pointer-events:none;transition:opacity .25s;z-index:99;max-width:88vw;text-align:center;}
  .toast.show{opacity:1;}
  .toast.err{background:var(--danger);}

  .progress-note{font-size:.8rem;color:var(--text-soft);text-align:center;margin:4px 0 10px;}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;}}
</style>
</head>

/* ============ STATE ============ */
const state = {};
function ensure(gid){ if(!(gid in state)) state[gid]=null; return state[gid]; }

/* ============ RENDER ============ */
const app = document.getElementById("app");
function build(){
  SCHEMA.forEach(sec=>{
    const card = document.createElement("div");
    card.className = "card" + (sec.open ? " open" : "");
    card.id = "card_" + sec.id;
    const h = document.createElement("h2");
    h.innerHTML = `<span class="tfnum">${sec.num}</span><span>${sec.title}</span><span class="donebadge">✓ Angaben</span><span class="chev">▼</span>`;
    h.addEventListener("click", ()=>card.classList.toggle("open"));
    card.appendChild(h);
    const body = document.createElement("div");
    body.className = "body";
    sec.groups.forEach(g=>{
      const grp = document.createElement("div");
      grp.className = "grp";
      if(g.label){ const l=document.createElement("label"); l.textContent=g.label; grp.appendChild(l); }
      if(g.type==="chips"||g.type==="seg"){
        const box=document.createElement("div"); box.className=(g.type==="seg")?"seg chips":"chips";
        g.opts.forEach(o=>{
          const c=document.createElement("button"); c.type="button"; c.className="chip"; c.textContent=o;
          c.addEventListener("click",()=>{
            if(g.type==="seg"){
              const was=c.classList.contains("on");
              box.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));
              if(!was) c.classList.add("on");
              state[g.id]= was? null : o;
            }else{
              c.classList.toggle("on");
              const sel=[...box.querySelectorAll(".chip.on")].map(x=>x.textContent);
              state[g.id]= sel.length? sel : null;
            }
            markCard(card, sec);
          });
          box.appendChild(c);
        });
        grp.appendChild(box);
      }
      else if(g.type==="risk"){
        const tbl=document.createElement("div"); tbl.className="risk-table";
        g.opts.forEach(risk=>{
          const row=document.createElement("div"); row.className="risk-row";
          const nm=document.createElement("div"); nm.className="risk-name"; nm.textContent=risk;
          const ops=document.createElement("div"); ops.className="risk-opts";
          ["kein","niedrig","mittel","hoch"].forEach(v=>{
            const c=document.createElement("button"); c.type="button"; c.className="chip"; c.dataset.v=v; c.textContent=v;
            c.addEventListener("click",()=>{
              const was=c.classList.contains("on");
              ops.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));
              if(!was) c.classList.add("on");
              if(!state.riskmatrix) state.riskmatrix={};
              if(was) delete state.riskmatrix[risk]; else state.riskmatrix[risk]=v;
              if(Object.keys(state.riskmatrix).length===0) state.riskmatrix=null;
              markCard(card, sec);
            });
            ops.appendChild(c);
          });
          row.appendChild(nm); row.appendChild(ops); tbl.appendChild(row);
        });
        grp.appendChild(tbl);
      }
      else{
        let el;
        if(g.type==="area"){ el=document.createElement("textarea"); }
        else{ el=document.createElement("input"); el.type = g.type==="num" ? "number" : (g.type==="date"?"date":"text"); }
        if(g.ph) el.placeholder=g.ph;
        el.id="f_"+g.id;
        if(g.type==="date" && g.id==="datum"){ el.value = new Date().toISOString().slice(0,10); state[g.id]=el.value; }
        el.addEventListener("input",()=>{ state[g.id]= el.value.trim()||null; markCard(card, sec); });
        grp.appendChild(el);
      }
      body.appendChild(grp);
    });
    card.appendChild(body);
    app.appendChild(card);
  });
  const note=document.createElement("div"); note.className="progress-note";
  note.textContent="Nur ausgefüllte Punkte erscheinen im PDF. Außer dem Klientennamen werden keine weiteren persönlichen Daten erfasst.";
  app.appendChild(note);
}
function markCard(card, sec){
  const has = sec.groups.some(g=>{
    const v=state[g.id];
    if(g.id==="datum") return false;
    return v!==null && v!==undefined && v!=="" && !(Array.isArray(v)&&!v.length);
  });
  card.classList.toggle("hasdata", has);
}
build();

/* ============ TOAST ============ */
const toast=document.getElementById("toast");
let toastT;
function showToast(msg, err){ toast.textContent=msg; toast.classList.toggle("err",!!err); toast.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>toast.classList.remove("show"),3200); }

/* ============ SUMMARY BUILD ============ */
function collectSummary(){
  const S=[];
  SCHEMA.forEach(sec=>{
    if(sec.id==="kopf") return;
    const lines=[];
    sec.groups.forEach(g=>{
      const v=state[g.id];
      if(v===null||v===undefined||v===""||(Array.isArray(v)&&!v.length)) return;
      if(g.type==="risk"){
        const entries=Object.entries(v);
        if(entries.length){
          entries.sort((a,b)=>["hoch","mittel","niedrig","kein"].indexOf(a[1])-["hoch","mittel","niedrig","kein"].indexOf(b[1]));
          entries.forEach(([r,lvl])=>lines.push(`${r}: Risiko ${lvl.toUpperCase()}`));
        }
      }
      else if(Array.isArray(v)) lines.push(`${g.label}: ${v.join(", ")}`);
      else lines.push(`${g.label}: ${v}`);
    });
    if(lines.length) S.push({title: sec.num!=="?"&&sec.num!=="R"&&sec.num!=="B"&&sec.num!=="⌂" ? `Themenfeld ${sec.num}: ${sec.title}` : sec.title, lines});
  });
  return S;
}

/* ============ PDF ============ */
async function makePdf(){
  const name=(state.name||"").trim();
  if(!name){ showToast("Bitte Klientennamen eintragen.", true); document.getElementById("f_name").focus(); document.getElementById("card_kopf").classList.add("open"); return; }
  const { jsPDF } = window.jspdf;
  const doc=new jsPDF({unit:"mm",format:"a4"});
  const W=210, ML=18, MR=18, CW=W-ML-MR;
  let y=0;

  function header(){
    doc.setFillColor(33,29,94); doc.rect(0,0,W,30,"F");
    try{ doc.setFillColor(255,255,255); doc.roundedRect(ML,6,44,18,2,2,"F"); doc.addImage(LOGO_JPEG,"JPEG",ML+2,9.4,40,11.2);}catch(e){}
    doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(14);
    doc.text("SIS-Erhebung – Zusammenfassung", W-MR, 14, {align:"right"});
    doc.setFontSize(9); doc.setFont("helvetica","normal");
    doc.text("Strukturierte Informationssammlung · Ambulante Pflege", W-MR, 20, {align:"right"});
    y=38;
  }
  function footer(pageNo){
    doc.setDrawColor(4,138,174); doc.setLineWidth(.6); doc.line(ML,285,W-MR,285);
    doc.setFontSize(8); doc.setTextColor(120,120,130); doc.setFont("helvetica","normal");
    doc.text("Pflegedienst Herrlich  |  SIS-Erhebung  |  Seite "+pageNo, W/2, 290, {align:"center"});
  }
  function ensureSpace(h){ if(y+h>278){ footer(doc.getNumberOfPages()); doc.addPage(); header(); } }

  header();
  // Stammkopf
  doc.setTextColor(43,43,58); doc.setFont("helvetica","bold"); doc.setFontSize(11);
  doc.text("Klient/in: "+name, ML, y);
  doc.setFont("helvetica","normal"); doc.setFontSize(9.5);
  const kopfInfo=[];
  if(state.pflegegrad) kopfInfo.push("Pflegegrad: "+state.pflegegrad);
  if(state.datum) kopfInfo.push("Erhebungsdatum: "+state.datum.split("-").reverse().join("."));
  if(kopfInfo.length){ y+=5.5; doc.text(kopfInfo.join("     "), ML, y); }
  y+=8;

  const summary=collectSummary();
  if(!summary.length){ showToast("Keine Angaben ausgewählt.", true); return; }

  summary.forEach(sec=>{
    ensureSpace(14);
    doc.setFillColor(224,243,248); doc.rect(ML,y-4.5,CW,7.5,"F");
    doc.setDrawColor(4,138,174); doc.setLineWidth(.8); doc.line(ML,y-4.5,ML,y+3);
    doc.setFont("helvetica","bold"); doc.setFontSize(10); doc.setTextColor(3,107,135);
    doc.text(sec.title, ML+3, y+0.5);
    y+=8.5;
    doc.setFont("helvetica","normal"); doc.setFontSize(9.2); doc.setTextColor(43,43,58);
    sec.lines.forEach(line=>{
      const wrapped=doc.splitTextToSize("•  "+line, CW-2);
      ensureSpace(wrapped.length*4.4+1);
      doc.text(wrapped, ML+1, y);
      y+=wrapped.length*4.4+1.2;
    });
    y+=3;
  });

  ensureSpace(16);
  doc.setDrawColor(200,200,210); doc.setLineWidth(.3); doc.line(ML,y,ML+70,y); doc.line(W-MR-70,y,W-MR,y);
  y+=4; doc.setFontSize(7.5); doc.setTextColor(120,120,130);
  doc.text("Datum / Unterschrift Pflegefachkraft", ML, y);
  doc.text("Datum / Unterschrift Klient/in bzw. Bevollmächtigte/r", W-MR-70, y);
  footer(doc.getNumberOfPages());

  const dateStr=new Date().toISOString().slice(0,10).replace(/-/g,"");
  const safeName=name.replace(/[^A-Za-zÄÖÜäöüß0-9]+/g,"_").replace(/^_+|_+$/g,"");
  const filename=`SIS_Aufnahme_${safeName}_${dateStr}.pdf`;
  const blob=doc.output("blob");

  // teilen oder herunterladen
  const file=new File([blob], filename, {type:"application/pdf"});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{ await navigator.share({files:[file], title:"SIS-Erhebung "+name}); showToast("PDF geteilt."); return; }
    catch(e){ if(e.name==="AbortError"){ showToast("Teilen abgebrochen – PDF wird heruntergeladen."); } }
  }
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=filename; document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(url); a.remove();},4000);
  showToast("PDF heruntergeladen.");
}

document.getElementById("btnPdf").addEventListener("click", makePdf);
document.getElementById("btnReset").addEventListener("click", ()=>{
  if(!confirm("Alle Eingaben löschen?")) return;
  location.reload();
});
</script>
</body>
